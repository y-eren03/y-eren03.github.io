<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hafta 7 - Bootstrap & JS Uygulaması</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/hafta7.css">
</head>
<body id="mainBody">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand" href="#">WP Lab</a>
        </div>
    </nav>

    <header class="bg-primary text-white text-center py-5 shadow-sm"> 
        <div class="container">
            <h1 class="display-4 fw-bold">Etkinlik Kayıt Sayfası</h1>
            <p class="lead">HAFTA 7: Bootstrap & JavaScript</p>
            <a class="btn btn-outline-info ms-lg-3" href="index.html">Ana Sayfa</a>
            <button id="themeBtn" class="btn btn-outline-info ms-lg-3">Tema Değiştir</button>
        </div>
    </header>

    <main class="container my-5">
        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary">KART 1</h5>
                        <p class="card-text">Kart 1 içeriği</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-success">KART 2</h5>
                        <p class="card-text">Kart 2 içeriği</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-info">KART 3</h5>
                        <p class="card-text">Kart 3 içeriği</p>
                    </div>
                </div>
            </div>
        </div>

        <section id="kayitFormu" class="bg-white p-4 rounded shadow-sm border">
            <h2 class="mb-4">Başvuru Formu</h2>
            <form id="etkinlikFormu">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Ad Soyad</label>
                        <input type="text" id="adSoyad" class="form-control" placeholder="Adınız ve Soyadınız">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">E-posta</label>
                        <input type="email" id="email" class="form-control" placeholder="ornek@mail.com">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Bölüm</label>
                    <select id="bolum" class="form-select">
                        <option value="">Seçiniz...</option>
                        <option value="Bilgisayar Mühendisliği">Bilgisayar Mühendisliği</option>
                        <option value="Yazılım Mühendisliği">Yazılım Mühendisliği</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Kısa Mesaj</label>
                    <textarea id="mesaj" class="form-control" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Başvuru Özeti Oluştur</button>
                <button type="reset" class="btn btn-outline-secondary">Formu Temizle</button>
            </form>
        </section>

        <div id="sonucAlani" class="mt-5 p-4 rounded border bg-light text-center">
            <p class="text-muted m-0">Özet Sonuç</p>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <p class="m-0">&copy; 2026 - Yusuf Eren Çelebi | Hafta 7 Laboratuvarı</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/hafta7.js"></script>
</body>
</html>
